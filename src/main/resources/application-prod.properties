# ==========================================
# Production Profile (application-prod.properties)
# ==========================================

# ==========================================
# Data Source (via environment)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# Connection Pooling (HikariCP - production optimized)
# ==========================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# ==========================================
# Logging (JSON format via logback-spring.xml)
# ==========================================
logging.level.root=WARN
logging.level.com.magalupay=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.amqp=INFO

# ==========================================
# Server Configuration (strict)
# ==========================================
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# ==========================================
# Actuator (restricted in prod)
# ==========================================
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoints.web.exposure.exclude=env,configprops

# ==========================================
# Security
# ==========================================
server.ssl.enabled=${SERVER_SSL_ENABLED:false}
server.ssl.key-store=${SERVER_SSL_KEYSTORE:}
server.ssl.key-store-password=${SERVER_SSL_KEYSTORE_PASSWORD:}

# ==========================================
# Performance
# ==========================================
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
