# ==========================================
# Database (via environment variables)
# ==========================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/creditcarddb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Active Profile
# ==========================================
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ==========================================
# Logging
# ==========================================
logging.level.root=${LOGGING_LEVEL_ROOT:INFO}
logging.level.com.magalupay=${LOGGING_LEVEL_COM_MAGALUPAY:DEBUG}

# ==========================================
# Health & Actuator
# ==========================================
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.export.prometheus.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ==========================================
# Swagger
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html

# ==========================================
# RabbitMQ
# ==========================================
spring.rabbitmq.host=${SPRING_RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5672}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD:guest}

app.rabbitmq.exchange=payment.exchange
app.rabbitmq.queue=payment.queue
app.rabbitmq.routingKey=payment.approved

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET:your-super-secret-key-min-32-chars-long-please}
jwt.expiration=${JWT_EXPIRATION_MS:3600000}

# ==========================================
# Graceful Shutdown
# ==========================================
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
